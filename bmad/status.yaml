recommendation: |
  Sprint 23 complete. The AI is now context-aware: the Chat tab sends the current
  document excerpt (up to 2 000 chars) as a base64 `ctx` param to /api/ai/stream,
  which injects it into the Anthropic system prompt inside a <document> block.
  A "📄 Use doc as context" toggle (default on) lets users opt out; state persists
  in localStorage. Prompt history (last 10) is stored in localStorage and recalled
  via ArrowUp/ArrowDown in the chat input. Next sprint could focus on
  AI-assisted document summarisation (one-click summary badge in the toolbar),
  or an export/print polish pass (PDF export, print stylesheet).
